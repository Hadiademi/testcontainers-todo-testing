name: CI

# Runs the full test suite (unit + integration + Selenium E2E) on every push
# and pull request. Testcontainers spins up real PostgreSQL and Chrome browser
# containers using the Docker engine that is pre-installed on GitHub runners,
# so no external Testcontainers Cloud account is needed.

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test (Maven + Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Show Docker version (Testcontainers needs it)
        run: docker version

      - name: Build and run all tests
        run: ./mvnw --batch-mode verify

      - name: Upload test reports
        if: always()            # upload even when tests fail, so we can inspect them
        uses: actions/upload-artifact@v4
        with:
          name: surefire-test-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
